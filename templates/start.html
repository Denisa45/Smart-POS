<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Denisa's Special</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    background: #e9e3b4;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', sans-serif;
    color: #7a5c3e;
    overflow: hidden;
  }

  #waiting {
    text-align: center;
    transition: opacity 0.5s;
  }

  #waiting .title {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 24px;
  }

  #waiting .sandwich {
    width: 260px;
    animation: float 3s ease-in-out infinite;
  }

  #waiting .hint {
    margin-top: 28px;
    font-size: 18px;
    color: #9a7a5a;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-14px); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  #welcome {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 24px;
    padding: 32px;
    max-width: 640px;
    width: 100%;
  }

  #welcome.visible {
    display: flex;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .greeting {
    font-size: 42px;
    font-weight: bold;
    line-height: 1.2;
  }

  .greeting span { color: #5a9e48; }

  .points-badge {
    background: #7bbf6a;
    color: white;
    border-radius: 999px;
    padding: 8px 20px;
    font-size: 15px;
    font-weight: 600;
  }

  .recs-label {
    font-size: 16px;
    color: #9a7a5a;
    margin-bottom: -8px;
  }

  .recs {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .rec-card {
    background: #f8f4e4;
    border: 2px solid #ceb98d;
    border-radius: 22px;
    padding: 14px 20px;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
    min-width: 130px;
  }

  .rec-card:hover {
    transform: translateY(-3px);
    background: #fff8e8;
  }

  .rec-name {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .rec-times {
    font-size: 13px;
    color: #9a7a5a;
  }

  .cta {
    margin-top: 8px;
    padding: 16px 44px;
    font-size: 20px;
    border-radius: 30px;
    border: none;
    background: #7bbf6a;
    color: white;
    cursor: pointer;
    font-weight: 700;
    transition: transform 0.15s, background 0.15s;
  }

  .cta:hover {
    transform: scale(1.04);
    background: #6aae5a;
  }

  .guest-note {
    font-size: 16px;
    color: #9a7a5a;
  }

  .admin-btn {
    position: fixed;
    top: 14px;
    right: 14px;
    background: rgba(255,255,255,0.3);
    border: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 12px;
    color: #7b5a3d;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .admin-btn:hover { opacity: 1; }
</style>
</head>
<body>

<button class="admin-btn" onclick="window.location.href='/dashboard'">Admin</button>

<div id="waiting">
  <div class="title">Denisa's Special</div>
<img src="{{ url_for('static', filename='assets/sandwich.png') }}" class="sandwich">
  <div class="hint">Look at the camera or tap your card</div>
<!-- replace the two buttons in #waiting -->
<div style="margin-top:30px;">
  <button class="cta" onclick="continueGuest()">
    Continue as Guest
  </button>
  <button class="cta"
          style="background:#efad4d;margin-left:10px;"
          onclick="showEnrollForm()">
    Become a Member
  </button>
</div>

<div id="enroll-panel" style="display:none; margin-top:24px; text-align:center;">
  <div style="font-size:20px; margin-bottom:12px;">Enter your name to enroll</div>
  <input id="enroll-name-input" type="text" placeholder="Your name"
         style="padding:12px 20px; font-size:18px; border-radius:12px;
                border:2px solid #ceb98d; outline:none; width:260px;"/>
  <br/><br/>
  <button class="cta" onclick="submitEnrollName()">Start Enrollment</button>
  <button class="cta" style="background:#aaa; margin-left:10px;"
          onclick="cancelEnroll()">Cancel</button>
  <div id="enroll-status" style="margin-top:16px; font-size:16px; color:#5a9e48;"></div>
</div>

</div>

<div id="welcome"></div>

<script>
 function showLoginChoice() {
    // choose_login state no longer used � buttons always visible, nothing to do
}
  const PRODUCTS = {{ menu_items | tojson }};
  let polling = true;

async function checkState() {
    if (!polling) return;
    try {
        const res = await fetch("/get_state");
        const data = await res.json();
        if (data.state === "logged_in") {
            polling = false;
            showWelcome(data);          // no await � show UI immediately
            loadRecommendations(data);  // separate async call, non-blocking
        } else if (data.state === "choose_login") {
            showLoginChoice();
        }
    } catch (e) {}
}

function showWelcome(stateData) {
    // show the frame immediately, no Gemini needed
    const welcome = document.getElementById("welcome");
    const sessionType = stateData.session_type;
    const userId = stateData.user;
    const isMember = sessionType === "member" && userId && userId !== "guest";

    let html = "";
    if (isMember) {
        const name = userId.charAt(0).toUpperCase() + userId.slice(1);
        html += `<div class="greeting">Hey, <span>${name}</span>!</div>`;
        if (stateData.bonus_points > 0) {
            html += `<div class="points-badge">? ${stateData.bonus_points} bonus points</div>`;
        }
        html += `<div id="recs-area" style="min-height:60px;">
                    <div style="color:#9a7a5a;font-size:15px;">Loading recommendations...</div>
                 </div>`;
    } else {
        html += `<div class="greeting">Welcome!</div>`;
        html += `<div class="guest-note">Browsing as guest</div>`;
    }
    html += `<button class="cta" onclick="goToMenu()">See full menu ?</button>`;

    welcome.innerHTML = html;
    document.getElementById("waiting").style.display = "none";
    welcome.classList.add("visible");
}

async function loadRecommendations(stateData) {
    // called after UI is already shown � Gemini failure won't block anything
    const sessionType = stateData.session_type;
    const userId = stateData.user;
    const isMember = sessionType === "member" && userId && userId !== "guest";
    if (!isMember) return;

    try {
        const r = await fetch("/get_recommendations");
        const d = await r.json();
        const recsArea = document.getElementById("recs-area");
        if (!recsArea) return;

        if (!d.success || !d.recommendations || d.recommendations.length === 0) {
            recsArea.innerHTML = `<div style="color:#9a7a5a;font-size:15px;">
                                     Browse our full menu below!.</div>`;
            return;
        }

        let html = "";
        if (d.pitch) {
            html += `<div style="background:#fffbee;border:2px dashed #7bbf6a;
                         border-radius:20px;padding:15px;margin:10px 0;
                         font-style:italic;color:#4a6b3d;">"${d.pitch}"</div>`;
        }
        html += `<div class="recs-label">Recommended for you</div><div class="recs">`;
        for (const rec of d.recommendations) {
            const pKey = Object.keys(PRODUCTS).find(
                k => PRODUCTS[k].name === rec.name
            ) || rec.name.toLowerCase().replace(/ /g, "_");
            html += `<div class="rec-card" onclick="addToCartAndGo('${pKey}', ${rec.price})">
                        <div class="rec-name">${rec.name}</div>
                        <div class="rec-times" style="color:#5a9e48;font-weight:bold;">
                            ${rec.price} lei</div>
                     </div>`;
        }
        html += `</div>`;
        recsArea.innerHTML = html;
    } catch (e) {
        const recsArea = document.getElementById("recs-area");
        if (recsArea) recsArea.innerHTML = "";
    }
}
function addToCartAndGo(id, customPrice = null) {
    const item = PRODUCTS[id];
    if (!item) { goToMenu(); return; }

    const cart = JSON.parse(localStorage.getItem("cart") || "{}");
    const finalPrice = customPrice !== null ? customPrice : item.price;

    if (!cart[id]) {
        cart[id] = {
            name: item.name,
            price: finalPrice,
            quantity: 0
        };
    }

    cart[id].quantity += 1;
    localStorage.setItem("cart", JSON.stringify(cart));
    window.location.href = "/menu";
}
  setInterval(checkState, 1000);
function goToMenu() {
  window.location.href = "/menu";
}
 async function continueGuest() {
    // log in as guest immediately � don't wait for recognizer
    await fetch('/guest_login', { method: 'POST' });
    // also tell recognizer to stop waiting
    fetch('/request_enrollment', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: 'guest'})
    });
}

function showEnrollForm() {
    window.location.href = '/enroll';
}

function cancelEnroll() {
    document.getElementById('enroll-panel').style.display = 'none';
    document.getElementById('enroll-status').textContent = '';
    document.getElementById('enroll-name-input').value = '';
}

async function submitEnrollName() {
    const name = document.getElementById('enroll-name-input').value.trim().toLowerCase();
    if (!name) {
        document.getElementById('enroll-status').textContent = 'Please enter a name.';
        return;
    }
    document.getElementById('enroll-status').textContent = 'Starting enrollment...';

    // Step 1: write enrollment request to Firebase
    await fetch('/start_enrollment', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({name: name})
    });

    // Step 2: tell recognizer to begin enrollment
    await fetch('/request_enrollment', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action: 'enroll'})
    });

    document.getElementById('enroll-status').textContent =
        'Look at the camera on the laptop � stay still!';
    pollEnrollmentStatus();
}

function pollEnrollmentStatus() {
    const interval = setInterval(async () => {
        const r = await fetch('/enrollment_status');
        const d = await r.json();
        if (d.status === 'done') {
            clearInterval(interval);
            document.getElementById('enroll-status').textContent =
                'Enrolled! Please look at the camera to log in.';
            setTimeout(() => {
                document.getElementById('enroll-panel').style.display = 'none';
                document.getElementById('enroll-status').textContent = '';
            }, 3000);
        } else if (d.status === 'capturing') {
            document.getElementById('enroll-status').textContent =
                'Capturing your face... stay still!';
        }
    }, 1500);
}
</script>
</body>
</html>
